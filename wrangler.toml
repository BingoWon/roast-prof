#:schema node_modules/wrangler/config-schema.json

name = "roast-prof"
main = "src/worker/index.ts"
compatibility_date = "2026-03-10"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[assets]
directory = "./dist"
binding = "ASSETS"

[observability]
enabled = true
head_sampling_rate = 1

upload_source_maps = true
